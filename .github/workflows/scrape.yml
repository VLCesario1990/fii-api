name: Atualizar FIIs

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Rodar scraper
        run: python scraper.py
