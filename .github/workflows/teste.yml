name: Testar FII

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Rodar app
        run: python app.py
